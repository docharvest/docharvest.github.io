name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read # list this run's upload-pages-artifact for create-deployment
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Create the Pages deployment only — do not poll status.
      # actions/deploy-pages waits up to 10m and *cancels* the deploy on timeout,
      # which made slow queues fail CI and abort an otherwise valid publish.
      - name: Queue GitHub Pages deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = 'github-pages';

            const listed = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              },
            );
            const artifact = listed.find((a) => a.name === artifactName);
            if (!artifact) {
              core.setFailed(
                `No artifact named "${artifactName}" in this run. Did upload-pages-artifact run?`,
              );
              return;
            }

            core.info(`Using artifact id=${artifact.id} size=${artifact.size_in_bytes ?? artifact.size ?? '?'}`);

            let idToken;
            try {
              idToken = await core.getIDToken();
            } catch (e) {
              core.setFailed(
                'Failed to mint OIDC token. Ensure permissions include id-token: write.',
              );
              return;
            }

            const { data } = await github.request(
              'POST /repos/{owner}/{repo}/pages/deployments',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                pages_build_version: context.sha,
                oidc_token: idToken,
              },
            );

            core.info(`Queued Pages deployment (no wait): ${JSON.stringify(data)}`);
            const pageUrl =
              data.page_url ||
              `https://${context.repo.owner}.github.io/${
                context.repo.repo === `${context.repo.owner}.github.io` ? '' : context.repo.repo + '/'
              }`;
            core.setOutput('page_url', pageUrl);
